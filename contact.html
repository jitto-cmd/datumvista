<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Contact Us | Datumvista</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="sec">
        <div class="inner">
            <h2 class="sec-h">Start your <em>Project</em></h2>
            <p class="sec-p">Tell us about your research requirement. Enquiries are treated with complete confidentiality.</p>
            <div class="cform">
                <input type="text" placeholder="Full Name">
                <input type="email" placeholder="Email Address">
                <input type="text" placeholder="Organisation">
                <textarea rows="5" placeholder="Describe your research requirement..."></textarea>
                <button type="submit">Submit Request</button>
            </div>
        </div>
    </section>

    <div style="background:#0d1a33; padding:30px; color:rgba(255,255,255,0.6); text-align:center; border-top:1px solid rgba(37,99,235,0.2);">
        <div class="inner">
            <p style="font-size:13px;"><b>Client Confidentiality:</b> Relationships are governed by NDAs. Credentials available upon request.</p>
        </div>
    </div>

    </body>
