<!DOCTYPE html>

<body>

<header>
  <nav class="nav">
    <h2 class="logo">DATUMVISTA</h2>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>

<section class="hero">
  <h1>Contact Us</h1>
  <p>Tell us about your project and we’ll get back to you.</p>
</section>

<section class="services">
  <h2>Get in Touch</h2>

 <form action="https://formsubmit.co/info@datumvista.com" method="POST" class="contact-form">

  <input type="text" name="name" placeholder="Your Name" required>

  <input type="email" name="email" placeholder="Your Email" required>

  <input type="text" name="company" placeholder="Company Name">

  <textarea name="message" placeholder="Describe your requirement..." rows="5" required></textarea>

  <button type="submit" class="btn primary">Submit Request</button>

  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_subject" value="New Datumvista Inquiry">
  <input type="hidden" name="_template" value="table">

</form>

</section>

<footer>
  <p>© 2026 Datumvista. All Rights Reserved.</p>
</footer>

</body>
</html>
